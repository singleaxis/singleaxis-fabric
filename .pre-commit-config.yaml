# Pre-commit hooks — https://pre-commit.com
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
        # Helm chart templates contain Go template directives (`{{- if
        # .Values.foo }}`) that are not valid YAML on their own. Exclude
        # anything under a chart's templates/ directory, plus our helm-
        # specific test fixtures. `Chart.yaml` / `values.yaml` are still
        # checked because they are real YAML.
        exclude: |
          (?x)^(
            charts/.*/templates/.*\.ya?ml|
            charts/.*/tests/.*/expected\.ya?ml
          )$
      - id: check-json
      - id: check-toml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  # mypy runs per-package in CI (see `.github/workflows/ci.yml`,
  # `python-mypy` job) against each package's own strict `[tool.mypy]`
  # config and its own dep graph. A repo-root pre-commit mypy with
  # `--ignore-missing-imports` would diverge from CI semantics, so we
  # keep type-checking in CI and keep pre-commit focused on fast
  # local-loop hygiene (ruff, gitleaks, file validity, EOF/whitespace).

  # helm-docs is intentionally NOT a pre-commit hook. The norwoodj/helm-docs
  # hook expects the `helm-docs` binary to already be installed on PATH and
  # errors out otherwise ("Please install helm-docs to run the pre-commit
  # hook"). We don't want `pre-commit run` in CI to require extra tooling
  # installed on the runner — pre-commit is scoped to fast local-loop
  # hygiene (ruff, gitleaks, markdownlint, file validity). Chart doc drift
  # is caught by the dedicated `Helm / Kubernetes lint` CI job and by
  # reviewers; bringing helm-docs back as a pre-commit hook would mean
  # either bundling the binary here or requiring every local contributor
  # to `brew install norwoodj/tap/helm-docs` before their first commit.

  # markdownlint-cli2 reads `.markdownlint-cli2.jsonc` from the repo
  # root, which is the single source of truth shared with the CI job
  # (DavidAnson/markdownlint-cli2-action). Earlier we used
  # markdownlint-cli with a different rule list, which drifted from
  # CI — switching to cli2 collapses both into one config.
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.13.0
    hooks:
      - id: markdownlint-cli2

  # Conventional-commit enforcement lives in CI (commitlint-github-action@v6,
  # see `.github/workflows/ci.yml`). Running gitlint here duplicates
  # that and drifts (two configs to keep in sync), so we keep the CI
  # gate as the source of truth.
