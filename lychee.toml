# Lychee markdown link checker config.
# Consumed by `.github/workflows/ci.yml` (`link-check` job).
#
# The CLI args in the workflow (`--verbose --no-progress --exclude-mail`) are
# preserved; this file adds URL-pattern excludes that can't be expressed inline
# without making the workflow command unreadable.

# Timeouts / retries — default lychee behaviour is aggressive on flaky hosts.
max_retries = 2
timeout = 20
max_concurrency = 8

# Skip mailto links (lychee's config key is `include_mail`; setting it to
# false excludes them).
include_mail = false

# Skip private / loopback / link-local addresses — `localhost:3000` appears in
# dev-cluster docs as an example UI URL, not a resolvable resource.
exclude_loopback = true
exclude_private = true
exclude_link_local = true

# Accept 2xx, 3xx, and a handful of benign 4xx. Some sites (e.g. langchain
# docs) serve 403 to headless crawlers even though the page renders fine
# in a browser; accept 403 globally rather than curating a per-URL
# allowlist that will rot. 202 is used by eur-lex.europa.eu as a polite
# "your request is queued", not a failure.
accept = [200, 202, 203, 206, 301, 302, 307, 308, 403, 429]

# URL patterns to skip entirely. These are known-good at the time of writing
# but fail in CI either because they don't exist yet (pre-release tag), the
# host rejects crawlers, or they're dev-only examples.
exclude = [
  # The v0.1.0-rc.1 release page and the CHANGELOG "compare" link both
  # materialise only after the tag is cut and goreleaser completes. The
  # docs reference them intentionally as the canonical install source, so
  # we can't drop the links — just skip the check until the release
  # lands. Re-enable after v0.1.0 ships as a stable tag.
  "^https://github\\.com/ai5labs/singleaxis-fabric/releases/tag/v0\\.1\\.0",
  "^https://github\\.com/ai5labs/singleaxis-fabric/releases/download/v0\\.1\\.0",
  "^https://github\\.com/ai5labs/singleaxis-fabric/compare/v0\\.1\\.0",

  # Fed Reserve moved SR-11-7 to a new URL structure without redirects; docs
  # still reference the canonical supervision letter.
  "^https://www\\.federalreserve\\.gov/supervisionreg/srletters/sr1107\\.htm",

  # langchain-ai reorganised their docs path; internal anchors now 404 on
  # direct crawl even though the top-level page resolves. Cover both the
  # repo host and the docs host (langgraph how-tos live on the github.io
  # subdomain, not on github.com).
  "^https://github\\.com/langchain-ai/",
  "^https://langchain-ai\\.github\\.io/",

  # Kyverno docs CDN flakes under CI crawl load.
  "^https://kyverno\\.io/",
]
