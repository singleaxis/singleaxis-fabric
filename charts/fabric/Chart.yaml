apiVersion: v2
name: fabric
description: |
  SingleAxis Fabric — open-source substrate for audit-ready AI agents.
  Umbrella chart; regulatory profiles select which components run and
  how they are configured. See specs/008-deployment-model.md for the
  authoritative shape.
type: application
version: 0.2.0
appVersion: "0.2.0"
kubeVersion: ">=1.29.0-0"
keywords:
  - ai-governance
  - compliance
  - observability
  - guardrails
home: https://github.com/singleaxis/singleaxis-fabric
sources:
  - https://github.com/singleaxis/singleaxis-fabric
maintainers:
  - name: SingleAxis
    url: https://singleaxis.com
icon: ""
annotations:
  category: Compliance
  licenses: Apache-2.0

# Subcharts — everything is optional. The umbrella ships with each
# subchart gated behind its own ``enabled`` toggle so an operator can
# start small (just otel-collector) and layer on the guardrail
# sidecars and local observability as the deployment matures.
#
# Components not in this repository (judge-workers, escalation-service,
# context-graph, telemetry-bridge, nats) are maintained by SingleAxis
# internally and are not part of this distribution.
dependencies:
  - name: otel-collector
    version: 0.2.0
    condition: otelCollector.enabled
    repository: ""
    tags:
      - telemetry

  - name: nemo-sidecar
    version: 0.2.0
    condition: nemoSidecar.enabled
    repository: ""
    tags:
      - guardrails

  - name: langfuse
    version: 0.2.0
    condition: langfuse.enabled
    repository: ""
    tags:
      - observability

  - name: redteam-runner
    version: 0.2.0
    condition: redteamRunner.enabled
    repository: ""
    tags:
      - security

  - name: update-agent
    version: 0.2.0
    condition: updateAgent.enabled
    repository: ""
    tags:
      - security
