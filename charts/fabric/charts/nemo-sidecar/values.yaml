# Default values for the nemo-sidecar subchart.
#
# Latency posture (P99, per check, inside the sidecar process):
#   /v1/check  <100ms  passthrough or Colang rails
# When the container is colocated with the agent (sidecar pattern)
# calls ride UDS and skip the TCP stack; the shared-Deployment mode
# shipped here is for smoke-tests and dev clusters only.

replicaCount: 1

image:
  repository: ghcr.io/singleaxis/fabric-nemo-sidecar
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop: [ALL]

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: "1000m"
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# NeMo cold-start loads the Colang bundle + spaCy models, which can
# take 10-20s on a fresh pod. Bumped readiness initialDelaySeconds
# from 3 to 20 to avoid Unready flapping during rolling deploys.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 20
  periodSeconds: 5
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

# Rails configuration.
#
# Resolution order:
#   1. If `railsConfigMap.name` is set → mount that ConfigMap.
#   2. Else if `starterRails.enabled` → mount the in-chart starter
#      bundle (deterministic `jailbreak defence` flow, no LLM).
#   3. Else → passthrough engine (fail-open). Dev only.
#
# The starter bundle keeps fresh installs from shipping fail-open,
# but is intentionally minimal. Production profiles should supply a
# full ConfigMap via `railsConfigMap.name`.
railsConfigMap:
  name: ""
  mountPath: /etc/fabric/rails

starterRails:
  enabled: true

# PodDisruptionBudget. Honored only when replicaCount > 1 (i.e. the
# sidecar-as-Service HA topology). Same-pod UDS deployments don't
# need it because lifecycle is tied to the parent agent pod.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# NetworkPolicy. Default off — see otel-collector/values.yaml. The
# typical NeMo deployment is same-pod via UDS, in which case this
# policy is a no-op. The sidecar-as-Service deployment (smoke/dev)
# is what `ingressFrom` covers. `egressTo` is for NeMo's
# content-safety rail when it calls out to an LLM provider for
# refusal generation; DNS to kube-system is always allowed.
networkPolicy:
  enabled: false
  ingressFrom: []
  egressTo: []
