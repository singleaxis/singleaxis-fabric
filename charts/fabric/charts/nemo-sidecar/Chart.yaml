apiVersion: v2
name: nemo-sidecar
description: |
  SingleAxis Fabric NeMo Colang guardrails sidecar (spec 005). Phase 1
  ships a TCP Deployment + Service suitable for shared-node dev
  clusters and smoke testing. Production deployments inject this
  container as a per-agent-pod sidecar for <100ms P99 UDS latency —
  the injection webhook lands in Phase 2.
