{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "update-agent.serviceAccountName" . }}
  labels:
    {{- include "update-agent.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The webhook receives AdmissionReview requests; it never calls the
# Kubernetes API. Don't mount the SA token.
automountServiceAccountToken: false
{{- end }}
