apiVersion: v1
kind: Service
metadata:
  name: {{ include "update-agent.fullname" . }}
  labels:
    {{- include "update-agent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: https
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  selector:
    {{- include "update-agent.selectorLabels" . | nindent 4 }}
