{{- if eq .Values.tls.mode "selfSigned" -}}
{{/*
Self-signed webhook cert.

Both this Secret and the ValidatingWebhookConfiguration derive their
cert material from the shared ``update-agent.tlsData`` helper. The
helper:

  - Reuses an existing in-cluster Secret on ``helm upgrade`` so the
    API server's cached caBundle stays valid.
  - Generates a fresh CA + signed cert ONCE on first install and
    memoizes it on ``$`` so the VWC template sees the same bytes.
*/}}
{{- $tls := fromYaml (include "update-agent.tlsData" .) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "update-agent.tlsSecretName" . }}
  labels:
    {{- include "update-agent.labels" . | nindent 4 }}
  annotations:
    fabric.singleaxis.dev/tls-mode: selfSigned
type: kubernetes.io/tls
data:
  ca.crt: {{ $tls.caCert }}
  tls.crt: {{ $tls.cert }}
  tls.key: {{ $tls.key }}
{{- end }}
