{{- if and .Values.auth.randomSecrets (not .Values.auth.existingSecret) -}}
{{- $fullName := include "langfuse.fullname" . -}}
{{- $secretName := printf "%s-auth" $fullName -}}
{{/*
Reuse the Secret across upgrades so rotating Helm releases doesn't
log every user out. Helm's `lookup` returns the existing secret when
it's present; we fall back to random bytes on first install.
*/}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
{{- $nextauth := "" -}}
{{- $salt := "" -}}
{{- if $existing -}}
{{- $nextauth = index $existing.data "NEXTAUTH_SECRET" -}}
{{- $salt = index $existing.data "SALT" -}}
{{- else -}}
{{- $nextauth = randAlphaNum 48 | b64enc -}}
{{- $salt = randAlphaNum 32 | b64enc -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
type: Opaque
data:
  NEXTAUTH_SECRET: {{ $nextauth }}
  SALT: {{ $salt }}
{{- end -}}
