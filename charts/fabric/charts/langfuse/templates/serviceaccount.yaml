{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "langfuse.serviceAccountName" . }}
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Langfuse talks to Postgres + serves its UI; it never calls the
# Kubernetes API. Don't mount the SA token.
automountServiceAccountToken: false
{{- end -}}
