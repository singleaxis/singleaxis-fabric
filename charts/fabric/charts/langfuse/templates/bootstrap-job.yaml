{{- if .Values.bootstrap.enabled -}}
{{- $keys := .Values.bootstrap.keys -}}
{{- if and (not $keys.existingSecret) (not (and $keys.publicKey $keys.secretKey)) -}}
  {{- fail "langfuse.bootstrap: set bootstrap.keys.existingSecret OR both bootstrap.keys.publicKey+secretKey" -}}
{{- end -}}
{{- $bootstrapTag := .Values.bootstrap.image.tag | default ((.Values.global).fabric).version -}}
{{- if not $bootstrapTag -}}
  {{- fail "langfuse.bootstrap: no image tag resolved. Install via the fabric umbrella chart (which sets global.fabric.version) or set langfuse.bootstrap.image.tag explicitly." -}}
{{- end -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "langfuse.fullname" . }}-bootstrap
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap
  annotations:
    # Run after the Langfuse Deployment is installed/upgraded and
    # remove the Job object on next upgrade so re-runs are clean.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.bootstrap.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.bootstrap.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "langfuse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bootstrap
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "langfuse.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          # The bootstrap image is Fabric-built tooling (it wraps the
          # upstream Langfuse API), so it is published at the FABRIC
          # release version, not Langfuse's upstream appVersion. Default
          # the tag to the umbrella chart's version (propagated as
          # `global.fabric.version` by the umbrella) rather than this
          # subchart's `.Chart.AppVersion`, which intentionally tracks
          # the upstream Langfuse release (e.g. 2.93.0) and would point
          # at an image tag that the release workflow never publishes.
          image: "{{ .Values.bootstrap.image.repository }}:{{ $bootstrapTag }}"
          imagePullPolicy: {{ .Values.bootstrap.image.pullPolicy }}
          args: ["run"]
          env:
            - name: LANGFUSE_HOST
              value: "http://{{ include "langfuse.fullname" . }}:{{ .Values.service.port }}"
            - name: FABRIC_PROFILE
              value: {{ .Values.bootstrap.profile | quote }}
            {{- if $keys.existingSecret }}
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $keys.existingSecret }}
                  key: LANGFUSE_PUBLIC_KEY
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $keys.existingSecret }}
                  key: LANGFUSE_SECRET_KEY
            {{- else }}
            - name: LANGFUSE_PUBLIC_KEY
              value: {{ $keys.publicKey | quote }}
            - name: LANGFUSE_SECRET_KEY
              value: {{ $keys.secretKey | quote }}
            {{- end }}
            {{- if .Values.bootstrap.curatedConfigMap }}
            - name: FABRIC_CURATED_DIR
              value: /etc/fabric/curated-override
            {{- end }}
          resources:
            {{- toYaml .Values.bootstrap.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          {{- if .Values.bootstrap.curatedConfigMap }}
          volumeMounts:
            - name: curated-override
              mountPath: /etc/fabric/curated-override
              readOnly: true
          {{- end }}
      {{- if .Values.bootstrap.curatedConfigMap }}
      volumes:
        - name: curated-override
          configMap:
            name: {{ .Values.bootstrap.curatedConfigMap }}
      {{- end }}
{{- end -}}
