{{- if not .Values.tenantKey.existingSecret }}
{{- fail "presidio-sidecar: tenantKey.existingSecret is required. The sidecar refuses to start without a tenant HMAC key. Create a Secret and set tenantKey.existingSecret to its name." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "presidio-sidecar.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "presidio-sidecar.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "presidio-sidecar.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "presidio-sidecar.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "presidio-sidecar.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: presidio-sidecar
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "{{ .Values.service.port }}"
            - "--tenant-key-file"
            - "/etc/fabric/tenant/{{ .Values.tenantKey.secretKey }}"
            - "--redaction-mode"
            - "{{ .Values.redactionMode }}"
            {{- if .Values.allowPassthrough }}
            - "--allow-passthrough"
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: tenant-key
              mountPath: /etc/fabric/tenant
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: tenant-key
          secret:
            secretName: {{ .Values.tenantKey.existingSecret }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
