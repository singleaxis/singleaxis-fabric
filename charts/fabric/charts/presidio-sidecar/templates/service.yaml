apiVersion: v1
kind: Service
metadata:
  name: {{ include "presidio-sidecar.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "presidio-sidecar.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "presidio-sidecar.selectorLabels" . | nindent 4 }}
