{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "redteam-runner.serviceAccountName" . }}
  labels:
    {{- include "redteam-runner.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Red-team CronJob hits an external agent endpoint; it never calls
# the Kubernetes API. Don't mount the SA token.
automountServiceAccountToken: false
{{- end -}}
