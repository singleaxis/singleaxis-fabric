name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  packages: write
  attestations: write

jobs:
  ci-green:
    name: Require green CI on tagged SHA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: read
    steps:
      - name: Verify CI workflow succeeded on ${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Release must not ship unless the CI workflow completed
        # successfully on the exact SHA the tag points to. We query the
        # CI workflow runs for this commit and require at least one
        # `completed / success` run for workflow file `ci.yml`.
        run: |
          set -euo pipefail
          runs_json=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${GITHUB_SHA}&per_page=50")
          success_count=$(echo "${runs_json}" \
            | jq '[.workflow_runs[] | select(.status=="completed" and .conclusion=="success")] | length')
          echo "Successful CI runs on ${GITHUB_SHA}: ${success_count}"
          if [ "${success_count}" -lt 1 ]; then
            echo "::error::No successful CI run found for ${GITHUB_SHA}."
            echo "Push a commit to main, wait for CI to pass, then tag that SHA."
            echo "Tag: ${GITHUB_REF_NAME}"
            exit 1
          fi

  verify-tag:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    needs: ci-green
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure tag points to a commit on main
        run: |
          git fetch origin main --depth=100
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Tag ${GITHUB_REF} is not on main; refusing to release."
            exit 1
          fi

  changelog:
    name: Extract changelog entry
    runs-on: ubuntu-latest
    needs: verify-tag
    outputs:
      notes: ${{ steps.extract.outputs.notes }}
    steps:
      - uses: actions/checkout@v4
      - id: extract
        name: Extract release notes for this version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os, pathlib, re, sys
          version = os.environ["GITHUB_REF_NAME"].lstrip("v")
          text = pathlib.Path("CHANGELOG.md").read_text()
          pattern = rf"## \[{re.escape(version)}\].*?(?=\n## \[|\Z)"
          m = re.search(pattern, text, re.S)
          if not m:
              sys.stderr.write(
                  f"::error::No `## [{version}]` heading found in CHANGELOG.md. "
                  f"Add a release entry for {version} before tagging, or retag "
                  f"after updating the changelog. Refusing to release with a "
                  f"placeholder body.\n"
              )
              sys.exit(1)
          body = m.group(0).strip()
          delim = "EOF_NOTES"
          print(f"notes<<{delim}")
          print(body)
          print(delim)
          PY

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: verify-tag
    steps:
      - uses: actions/checkout@v4
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cdx.json
          retention-days: 90

  source-archive:
    name: Build signed source archive
    runs-on: ubuntu-latest
    needs: [verify-tag, sbom]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: sbom
          path: .
      - name: Create source tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="singleaxis-fabric-${VERSION}.tar.gz"
          git archive --format=tar.gz --prefix="singleaxis-fabric-${VERSION}/" -o "${ARCHIVE}" HEAD
          sha256sum "${ARCHIVE}" sbom.spdx.json sbom.cdx.json > SHA256SUMS
      - uses: sigstore/cosign-installer@v3
      - name: Sign artifacts (keyless via Fulcio)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="singleaxis-fabric-${VERSION}.tar.gz"
          cosign sign-blob --yes "${ARCHIVE}" \
            --output-signature "${ARCHIVE}.sig" \
            --output-certificate "${ARCHIVE}.pem"
          cosign sign-blob --yes sbom.spdx.json \
            --output-signature sbom.spdx.json.sig \
            --output-certificate sbom.spdx.json.pem
          cosign sign-blob --yes sbom.cdx.json \
            --output-signature sbom.cdx.json.sig \
            --output-certificate sbom.cdx.json.pem
      - uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            singleaxis-fabric-*.tar.gz
            sbom.spdx.json
            sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: |
            singleaxis-fabric-*.tar.gz
            singleaxis-fabric-*.tar.gz.sig
            singleaxis-fabric-*.tar.gz.pem
            sbom.spdx.json
            sbom.spdx.json.sig
            sbom.spdx.json.pem
            sbom.cdx.json
            sbom.cdx.json.sig
            sbom.cdx.json.pem
            SHA256SUMS

  publish-image:
    name: Build and publish collector image
    runs-on: ubuntu-latest
    needs: verify-tag
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/fabric-otelcol
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive version
        id: vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.version }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: components/otel-collector-fabric
          file: components/otel-collector-fabric/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: sigstore/cosign-installer@v3
      - name: Sign image (keyless via Fulcio)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          # Sign every pushed tag by its immutable digest so the
          # signature survives tag re-pointing.
          for tag in ${{ steps.meta.outputs.tags }}; do
            ref="${tag}@${{ steps.build.outputs.digest }}"
            echo "cosign sign ${ref}"
            cosign sign --yes "${ref}"
          done
      - uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  publish-chart:
    name: Package and publish Helm chart
    runs-on: ubuntu-latest
    needs: verify-tag
    permissions:
      contents: read
      id-token: write
      packages: write
    env:
      REGISTRY: ghcr.io
      OCI_REF: oci://ghcr.io/${{ github.repository_owner }}/charts
      CHART_DIR: charts/fabric/charts/otel-collector
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: "v3.15.0"
      # Both logins are needed: `helm push` uses the helm-specific
      # credential store, but `cosign sign` reads ~/.docker/config.json
      # to pull the just-pushed manifest by digest. Without docker
      # login, cosign hits a 401 from ghcr.io/token on signing.
      - name: Log in to GHCR (docker auth for cosign)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login "${REGISTRY}" \
                --username "${{ github.actor }}" --password-stdin
      - name: Package chart
        id: package
        run: |
          helm package "${CHART_DIR}" --destination dist/
          pkg="$(ls dist/*.tgz)"
          echo "pkg=${pkg}" >> "$GITHUB_OUTPUT"
          chart_version="$(helm show chart "${CHART_DIR}" | awk '/^version:/{print $2}')"
          echo "chart_version=${chart_version}" >> "$GITHUB_OUTPUT"
      - name: Push chart to GHCR OCI
        id: push
        run: |
          out=$(helm push "${{ steps.package.outputs.pkg }}" "${OCI_REF}" 2>&1)
          echo "${out}"
          # helm push writes `Digest: sha256:...` to stderr/stdout.
          digest=$(echo "${out}" | awk '/Digest:/ {print $2}')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
      - uses: sigstore/cosign-installer@v3
      - name: Sign chart artifact
        env:
          COSIGN_EXPERIMENTAL: "1"
          CHART_NAME: otel-collector
        run: |
          ref="ghcr.io/${{ github.repository_owner }}/charts/${CHART_NAME}:${{ steps.package.outputs.chart_version }}@${{ steps.push.outputs.digest }}"
          echo "cosign sign ${ref}"
          cosign sign --yes "${ref}"
      - uses: actions/upload-artifact@v4
        with:
          name: chart-package
          path: dist/*.tgz
          retention-days: 90

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [changelog, source-archive, publish-image, publish-chart]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: chart-package
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ needs.changelog.outputs.notes }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: dist/*
          fail_on_unmatched_files: true
