name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan to catch newly disclosed issues in pinned deps.
    - cron: "0 6 * * 1"

# Top-level permissions must stay read-only so ossf/scorecard-action can
# publish its signed result to the public Scorecard webapp. When
# `security-events: write` is set at the workflow level, scorecard's
# sigstore/Fulcio verification rejects the upload with a 400 (see
# https://github.com/ossf/scorecard-action#workflow-restrictions).
# Write scopes are granted per-job only.
permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # gitleaks-action@v2 now requires a paid licence for orgs. Run
      # the upstream binary directly instead — same detection engine,
      # no licence key, no managed SaaS dependency.
      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --redact --verbose --exit-code 1

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Needed to upload trivy-fs.sarif to the Code Scanning API.
      security-events: write
    steps:
      - uses: actions/checkout@v4
      # Pin is `v`-prefixed — upstream dropped unprefixed release tags.
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          # Without this, the action unsets TRIVY_SEVERITY for SARIF
          # output (see entrypoint.sh), so MEDIUM/LOW findings also
          # trip exit-code:1 — which is why transitive langgraph
          # MEDIUMs were failing this job even after HIGH/CRITICAL
          # fixes. Keep the SARIF scoped to our declared gate.
          limit-severities-for-sarif: "true"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container: semgrep/semgrep
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    permissions:
      contents: read
      # Needed to upload semgrep.sarif to the Code Scanning API.
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: semgrep scan --config auto --sarif --output semgrep.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  osv-scanner:
    name: OSV dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google/osv-scanner-action/osv-scanner-action@v1.9.0
        with:
          scan-args: |-
            --recursive
            --lockfile-only
            --skip-git
            ./

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    permissions:
      security-events: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: scorecard.sarif
